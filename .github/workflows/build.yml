name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          $unformatted = gofmt -l .
          if ($unformatted) {
            Write-Output "The following files are not formatted:"
            Write-Output $unformatted
            exit 1
          }

      - name: Lint
        uses: golangci/golangci-lint-action@v9

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o logging.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: logging.exe
          path: logging.exe
