name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o logging.exe .

      - name: Create zip archive
        run: Compress-Archive -Path logging.exe, config.toml -DestinationPath logging-rs.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: logging-rs.zip
